[phases.setup]
nixPkgs = ["php83", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.tokenizer", "php83Extensions.zip", "php83Extensions.curl", "php83Extensions.gd"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php",
  "php composer.phar install --no-dev --optimize-autoloader"
]

[phases.build]
cmds = ["php composer.phar dump-autoload --optimize"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"